services:
  - type: web
    name: soi-agent
    runtime: node
    repo: https://github.com/kinkinpapa618/Soi-Agent.git
    plan: free
    region: singapore
    buildCommand: npm install && npm run build
    startCommand: node startup.cjs
    healthCheckPath: /api/products
    envVarGroups:
      - name: soi-agent
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "5000"
      - key: DATABASE_URL
        fromDatabase:
          name: soi-agent-db
          property: connectionString
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true

databases:
  - name: soi-agent-db
    region: singapore
    plan: free
    databaseName: soi_agent
    ipAllowList: []
