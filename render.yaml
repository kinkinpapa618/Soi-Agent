services:
  - type: web
    name: soi-agent
    runtime: node
    repo: https://github.com/kinkinpapa618/Soi-Agent.git
    plan: free
    region: singapore
    buildCommand: npm install; npm run build; npx drizzle-kit migrate
    startCommand: npx drizzle-kit migrate; node dist/index.cjs
    healthCheckPath: /health
    envVarGroups:
      - name: soi-agent
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_API_KEY
        sync: false
      - key: AI_INTEGRATIONS_OPENAI_BASE_URL
        sync: false
      - key: NVIDIA_API_KEY
        sync: false
      - key: SESSION_SECRET
        generateValue: true
